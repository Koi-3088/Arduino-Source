# templates/sleep-signal.yml
# Template for putting Windows/Linux host to sleep via USB relay controller
# AT commands: AT+CH1=1 (close relay), AT+CH1=0 (open relay)

parameters:
  stageName: ''
  displayName: ''
  dependsOn: []
  condition: ''

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}

    jobs:
      - job: SendSleepSignal
        displayName: Send Sleep Signal via Relay
        pool:
          name: ${{ parameters.poolName }}
        timeoutInMinutes: 10
        steps:
          - checkout: none

          - script: |
              set -e

              echo "📡 Sending sleep signal via USB relay"
              echo "AT+CH1=1" | sudo tee /dev/ttyUSB0 > /dev/null
              sleep 0.5
              echo "AT+CH1=0" | sudo tee /dev/ttyUSB0 > /dev/null

              echo "✅ Sleep signal sent successfully"
            displayName: 'Send Sleep Signal via Relay'
            condition: succeeded()
