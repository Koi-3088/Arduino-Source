# templates/sleep-wake-signal.yml
# Template for putting Windows/Linux host to sleep/wake via USB relay controller
# AT commands: AT+CH1=1 (close relay), AT+CH1=0 (open relay)

parameters:
  stageName: ''
  displayName: ''
  dependsOn: []
  condition: ''

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}

    jobs:
      - job: SendSleepWakeSignal
        displayName: Send Sleep/Wake Signal via Relay
        pool:
          name: ${{ parameters.poolName }}
        timeoutInMinutes: 10
        steps:
          - checkout: none

          - task: DownloadSecureFile@1
            name: WakeRelay
            displayName: 'Download Wake/Sleep Script'
            inputs:
              secureFile: 'WakeRelay.py'

          - script: |
              set -e
              python3 $(WakeRelay.secureFilePath)
              echo "✅ Sleep/Wake signal sent successfully"
            displayName: 'Send Sleep/Wake Signal via Relay'
            condition: succeeded()
