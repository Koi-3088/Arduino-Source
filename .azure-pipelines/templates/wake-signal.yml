# templates/wake-signal.yml
# Template for waking up the Windows/Linux host via USB relay controller
# AT commands: AT+CH1=1 (close relay), AT+CH1=0 (open relay)

parameters:
  stageName: ''
  displayName: ''
  dependsOn: []
  condition: ''

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    dependsOn: ${{ parameters.dependsOn }}
    condition: ${{ parameters.condition }}

    jobs:
      - job: SendWakeUpSignal
        displayName: Send Wake-Up Signal via Relay
        pool:
          name: ${{ parameters.poolName }}
        timeoutInMinutes: 10
        steps:
          - checkout: none

          - script: |
              set -e

              echo "📡 Sending wake signal via USB relay"
              echo "AT+CH1=1" > /dev/ttyUSB1
              sleep 0.5
              echo "AT+CH1=0" > /dev/ttyUSB1

              echo "✅ Wake signal sent successfully"
            displayName: 'Send Wake-Up Signal via Relay'
            condition: succeeded()
